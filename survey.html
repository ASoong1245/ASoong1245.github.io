<main>

<h1 id="title">Annoyed Stoat Pest Control Company Report</h1>
<p id="description">
Tell the Annoyed Stoat Pest Control Company what creature has invaded your territory so we can deal with it immediately.
</p>

<form id="survey-form">

<label id="name-label" for="name">Your Name</label>
<input id="name" type="text" placeholder="Enter your name" required>

<br><br>

<label id="email-label" for="email">Your Email</label>
<input id="email" type="email" placeholder="Enter your email" required>

<br><br>

<label id="number-label" for="number">How many pests did you see?</label>
<input id="number" type="number" min="1" max="100" placeholder="Number of pests">

<br><br>

<label for="dropdown">Which pest is bothering you most?</label>
<select id="dropdown">
  <option value="">Select the pest</option>
  <option value="rat">Rat</option>
  <option value="raccoon">Raccoon</option>
  <option value="snake">Snake</option>
  <option value="squirrel">Squirrel</option>
  <option value="possum">Possum</option>
</select>

<br><br>

<p>How urgent is the situation?</p>

<label>
<input type="radio" name="urgency" value="low">
Mildly annoying
</label>

<label>
<input type="radio" name="urgency" value="medium">
Very annoying
</label>

<label>
<input type="radio" name="urgency" value="high">
EXTREMELY annoying
</label>

<br><br>

<p>Where are the pests located?</p>

<label>
<input type="checkbox" value="attic">
Attic
</label>

<label>
<input type="checkbox" value="basement">
Basement
</label>

<label>
<input type="checkbox" value="yard">
Yard
</label>

<label>
<input type="checkbox" value="walls">
Inside the walls
</label>

<br><br>

<label for="comments">Additional Details for the Stoat</label>
<textarea id="comments" rows="4" cols="40" placeholder="Describe the pest problem..."></textarea>

<br><br>

<input id="submit" type="submit" value="Send Report to the Annoyed Stoat">

</form>

</main>

<script src="itis3135/scripts/HTMLinclude.min.js"></script>
